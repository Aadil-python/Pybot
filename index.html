<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PyBot — AI Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a0f;
    --panel: #0a1520;
    --border: #0ff3;
    --green: #00ff88;
    --cyan: #00e5ff;
    --text: #b8ffe0;
    --dim: #4a7a6a;
    --glow: 0 0 12px #00ff8866;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.015) 2px, rgba(0,255,136,0.015) 4px);
    pointer-events: none;
    z-index: 999;
  }
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, #0a1520, #071218);
    flex-shrink: 0;
  }
  .logo { font-family: 'Orbitron', monospace; font-weight: 900; font-size: 1.1rem; color: var(--green); text-shadow: var(--glow); letter-spacing: 3px; }
  .logo span { color: var(--cyan); }
  .status { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; color: var(--dim); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

  .msg { display: flex; gap: 12px; animation: fadeIn 0.3s ease; }
  .msg.user { flex-direction: row-reverse; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .avatar {
    width: 36px; height: 36px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; font-weight: bold; flex-shrink: 0;
    font-family: 'Orbitron', monospace;
  }
  .msg.bot .avatar { background: linear-gradient(135deg,#001a10,#003320); border: 1px solid var(--green); color: var(--green); box-shadow: var(--glow); }
  .msg.user .avatar { background: linear-gradient(135deg,#001520,#002030); border: 1px solid var(--cyan); color: var(--cyan); }

  .bubble { max-width: 72%; padding: 12px 16px; border-radius: 4px; font-size: 0.88rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .msg.bot .bubble { background: linear-gradient(135deg,#071810,#0a1f14); border: 1px solid #00ff8833; color: var(--text); border-top-left-radius: 0; }
  .msg.user .bubble { background: linear-gradient(135deg,#071525,#0c1e30); border: 1px solid #00e5ff33; color: #a0d4f5; border-top-right-radius: 0; text-align: right; }

  .bubble code { background:#001a0a; border:1px solid #00ff8844; padding:2px 6px; border-radius:3px; color:var(--green); font-family:'Share Tech Mono',monospace; font-size:0.85em; }
  .bubble pre { background:#001a0a; border:1px solid #00ff8844; padding:10px; border-radius:4px; overflow-x:auto; margin:6px 0; }
  .bubble pre code { background:none; border:none; padding:0; }

  .typing .bubble { display:flex; align-items:center; gap:6px; padding:14px 18px; }
  .typing-dot { width:6px; height:6px; background:var(--green); border-radius:50%; animation:blink 1.2s infinite; box-shadow:0 0 6px var(--green); }
  .typing-dot:nth-child(2){animation-delay:0.2s}
  .typing-dot:nth-child(3){animation-delay:0.4s}
  @keyframes blink { 0%,100%{opacity:0.2;transform:translateY(0)} 50%{opacity:1;transform:translateY(-4px)} }

  #welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; gap:12px; opacity:0.6; }
  #welcome .big { font-family:'Orbitron',monospace; font-size:2rem; font-weight:900; color:var(--green); text-shadow:var(--glow); letter-spacing:4px; }
  #welcome .sub { font-size:0.8rem; color:var(--dim); letter-spacing:2px; }
  #welcome .hints { margin-top:20px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .hint-chip { border:1px solid #00ff8833; padding:7px 14px; border-radius:20px; font-size:0.75rem; color:var(--dim); cursor:pointer; transition:all 0.2s; }
  .hint-chip:hover { border-color:var(--green); color:var(--green); box-shadow:var(--glow); }

  #input-area { padding:16px 20px; border-top:1px solid var(--border); background:linear-gradient(180deg,#071218,#050a0f); flex-shrink:0; }
  #input-wrap { display:flex; align-items:flex-end; gap:10px; background:#0a1520; border:1px solid #00ff8844; border-radius:6px; padding:10px 14px; transition:all 0.2s; }
  #input-wrap:focus-within { border-color:var(--green); box-shadow:var(--glow); }
  #prompt-prefix { color:var(--green); font-size:0.9rem; line-height:1.5; flex-shrink:0; margin-bottom:2px; }
  #user-input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-family:'Share Tech Mono',monospace; font-size:0.88rem; resize:none; min-height:24px; max-height:120px; line-height:1.5; caret-color:var(--green); }
  #user-input::placeholder { color:var(--dim); }
  #send-btn { background:linear-gradient(135deg,#003320,#004428); border:1px solid var(--green); color:var(--green); width:36px; height:36px; border-radius:4px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; font-size:1rem; }
  #send-btn:hover:not(:disabled) { background:var(--green); color:#000; box-shadow:var(--glow); }
  #send-btn:disabled { opacity:0.4; cursor:not-allowed; }
  #footer-info { text-align:center; font-size:0.62rem; color:var(--dim); margin-top:8px; letter-spacing:1px; }
</style>
</head>
<body>

<div id="header">
  <div class="logo">PY<span>BOT</span></div>
  <div class="status"><div class="dot"></div><span>SYSTEM ONLINE</span></div>
</div>

<div id="chat">
  <div id="welcome">
    <div class="big">PYBOT</div>
    <div class="sub">// AI TERMINAL — READY FOR INPUT</div>
    <div class="hints">
      <div class="hint-chip" onclick="setInput('Explain Python decorators')">Python decorators</div>
      <div class="hint-chip" onclick="setInput('Write bubble sort in Python')">Bubble sort</div>
      <div class="hint-chip" onclick="setInput('What is recursion?')">Recursion kya hai?</div>
      <div class="hint-chip" onclick="setInput('Difference between list and tuple')">List vs Tuple</div>
    </div>
  </div>
</div>

<div id="input-area">
  <div id="input-wrap">
    <span id="prompt-prefix">&gt;_</span>
    <textarea id="user-input" rows="1" placeholder="Type your message here..." autocomplete="off"></textarea>
    <button id="send-btn" onclick="sendMessage()">&#9658;</button>
  </div>
  <div id="footer-info">ENTER to send &nbsp;|&nbsp; SHIFT+ENTER for new line</div>
</div>

<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const welcomeEl = document.getElementById('welcome');
let history = [];
let isTyping = false;

// Automatically detect if running on Render or localhost
const API_BASE = window.location.origin;

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function setInput(text) {
  inputEl.value = text;
  inputEl.focus();
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
}

function appendMsg(role, text) {
  if (welcomeEl) welcomeEl.style.display = 'none';
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;
  msg.innerHTML = `<div class="avatar">${role === 'bot' ? 'AI' : 'YOU'}</div><div class="bubble">${formatText(text)}</div>`;
  chatEl.appendChild(msg);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function formatText(text) {
  let t = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,l,c) => `<pre><code>${c.trim()}</code></pre>`);
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  return t;
}

function showTyping() {
  if (welcomeEl) welcomeEl.style.display = 'none';
  const msg = document.createElement('div');
  msg.className = 'msg bot typing';
  msg.id = 'typing-indicator';
  msg.innerHTML = `<div class="avatar">AI</div><div class="bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  chatEl.appendChild(msg);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isTyping) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  isTyping = true;
  sendBtn.disabled = true;

  appendMsg('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch(`${API_BASE}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });

    const data = await res.json();
    removeTyping();

    if (data.error) {
      appendMsg('bot', '[ERROR] ' + data.error);
    } else {
      history.push({ role: 'assistant', content: data.reply });
      appendMsg('bot', data.reply);
    }
  } catch (err) {
    removeTyping();
    appendMsg('bot', '[ERROR] Server se connect nahi hua: ' + err.message);
  }

  isTyping = false;
  sendBtn.disabled = false;
  inputEl.focus();
}
</script>
</body>
</html>
